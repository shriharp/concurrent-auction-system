<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Auction System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --main-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #312e81 0%, var(--bg-color) 70%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--glass-border) inset;
            transition: all 0.4s ease;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: var(--main-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        button {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary {
            background: var(--main-gradient);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
        }

        .button-row {
            display: flex;
            gap: 1rem;
        }

        /* Auction Room Specifics */
        #auctionRoom {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        .highest-bid-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.2);
        }

        .highest-bid-card span {
            display: block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .highest-bid-card .amount {
            font-size: 3.5rem;
            font-weight: 700;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
            font-variant-numeric: tabular-nums;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bid-controls {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .bid-controls input {
            flex: 1;
            font-size: 1.1rem;
        }

        .bid-controls button {
            width: auto;
            padding: 0 2rem;
        }

        #log {
            background: rgba(0, 0, 0, 0.4);
            padding: 1.2rem;
            border-radius: 12px;
            height: 240px;
            overflow-y: auto;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--accent);
            border: 1px solid rgba(0, 0, 0, 0.5);
            box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        #log .system {
            color: var(--text-secondary);
        }

        #log .error {
            color: var(--error);
        }

        #log .highlight {
            color: #38bdf8;
            font-weight: bold;
        }

        /* Scrollbar styles for log */
        #log::-webkit-scrollbar {
            width: 6px;
        }

        #log::-webkit-scrollbar-track {
            background: transparent;
        }

        #log::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Auth Section -->
        <div id="authSection">
            <h1>Welcome to the Auction Management System</h1>
            <p class="subtitle">Sign in or create an account to start bidding securely.</p>

            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Username" autocomplete="off">
                <input type="password" id="passwordInput" placeholder="Password">
            </div>

            <div class="button-row">
                <button class="btn-primary" onclick="authenticate('signin')">Sign In</button>
                <button class="btn-secondary" onclick="authenticate('signup')">Create Account</button>
            </div>

            <div id="authError"
                style="color: var(--error); text-align: center; margin-top: 1rem; font-size: 0.9rem; display: none;">
            </div>
        </div>

        <!-- Auction Room Section -->
        <div id="auctionRoom">
            <h1>Vintage Rolex</h1>
            <p class="subtitle" id="userGreeting">Connected</p>

            <div class="highest-bid-card">
                <span>Current Highest Bid</span>
                <div class="amount" id="currentBidDisplay">$1000</div>
            </div>

            <div class="bid-controls">
                <input type="number" id="bidAmount" placeholder="Enter bid amount (e.g., 1050)">
                <button class="btn-primary" onclick="placeBid()">Place Bid</button>
            </div>

            <div id="log"></div>
        </div>
    </div>

    <script>
        let ws;
        let activeUserId;
        const logDisplay = document.getElementById('log');
        const authError = document.getElementById('authError');

        function log(msg, type = 'normal') {
            const el = document.createElement('div');
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
            el.innerHTML = `<span style="opacity:0.5">[${time}]</span> ${msg}`;
            el.className = type;
            logDisplay.appendChild(el);
            logDisplay.scrollTop = logDisplay.scrollHeight;
        }

        async function authenticate(action) {
            const user = document.getElementById('usernameInput').value;
            const pass = document.getElementById('passwordInput').value;
            authError.style.display = 'none';

            if (!user || !pass) {
                authError.textContent = 'Username and password are required.';
                authError.style.display = 'block';
                return;
            }

            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = 'Please wait...';
            btn.disabled = true;

            try {
                const endpoint = action === 'signup' ? '/auth/signup' : '/auth/signin';
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.message || `Authentication failed. Status: ${res.status}`);
                }

                activeUserId = data.user_id;
                document.getElementById('userGreeting').textContent = `Authenticated exactly as ${data.username}`;

                // Transition UI
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('auctionRoom').style.display = 'block';

                log(`Successfully authenticated via ${action}.`, 'system');
                log(`Token securely received. Negotiating WebSocket connection...`, 'system');

                // Connect WS
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws?token=${data.token}`;

                if (ws) { ws.close(); }

                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    log('WebSocket connection established. TLS/TCP Secured.', 'highlight');
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.type === 'NEW_HIGHEST_BID') {
                        const amt = data.amount;
                        const winner = data.winner_id;

                        // Animate price change
                        const bidDisplay = document.getElementById('currentBidDisplay');
                        bidDisplay.style.transform = 'scale(1.1)';
                        bidDisplay.style.color = '#fff';
                        setTimeout(() => {
                            bidDisplay.style.transform = 'scale(1)';
                            bidDisplay.style.color = '#fbbf24';
                        }, 200);

                        bidDisplay.textContent = `$${amt}`;

                        if (winner === activeUserId) {
                            log(`You just secured the highest bid: <strong style="color:white">$${amt}</strong>`, 'highlight');
                        } else {
                            log(`User ${winner} placed a new high bid: $${amt}`, 'system');
                        }
                    }
                };

                ws.onclose = () => log('WebSocket connection unexpectedly closed.', 'error');
                ws.onerror = (err) => log('WebSocket error encountered.', 'error');

            } catch (err) {
                authError.textContent = err.message;
                authError.style.display = 'block';
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        function placeBid() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('Cannot bid: Not connected to server.', 'error');
                return;
            }

            const bidInput = document.getElementById('bidAmount');
            const amountStr = bidInput.value;
            const amount = parseInt(amountStr, 10);

            if (!amount) return;

            const payload = {
                auction_id: 1,
                amount: amount
            };
            ws.send(JSON.stringify(payload));
            log(`Transmitting rapid bid request for $${amount}...`, 'system');

            bidInput.value = ''; // clear input
            bidInput.focus();
        }

        // Allow hitting Enter to log in
        document.getElementById('passwordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') authenticate('signin');
        });

        // Allow hitting Enter to place bid
        document.getElementById('bidAmount').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') placeBid();
        });
    </script>
</body>

</html>
